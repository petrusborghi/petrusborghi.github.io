<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Petrus Borghi</title>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  font-family: 'Segoe UI', sans-serif;
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  background: linear-gradient(270deg, #020617, #0f172a, #020617);
  background-size: 400% 400%;
  animation: bgMove 15s ease infinite;
  color: white;
}

@keyframes bgMove {
  0% { background-position: 0% }
  50% { background-position: 100% }
  100% { background-position: 0% }
}

/* CONTAINER */
.container {
  width: 95%;
  max-width: 420px;
  height: 90vh;
  border-radius: 20px;
  background: rgba(15,23,42,0.75);
  backdrop-filter: blur(15px);
  box-shadow: 0 0 60px rgba(56,189,248,0.15);
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

/* HEADER */
.header {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 12px;
  border-bottom: 1px solid rgba(255,255,255,0.05);
}

.avatar-container {
  position: relative;
  width: 55px;
  height: 55px;
  cursor: pointer;
}

.avatar {
  width: 100%;
  height: 100%;
  border-radius: 50%;
  background: url('foto.jpg');
  background-size: cover;
  background-position: center;
  animation: borderAnim 4s linear infinite;
}

@keyframes borderAnim {
  0% { box-shadow: 0 0 0px #22c55e; }
  50% { box-shadow: 0 0 12px #22c55e; }
  100% { box-shadow: 0 0 0px #22c55e; }
}

.online {
  position: absolute;
  bottom: 2px;
  right: 2px;
  width: 12px;
  height: 12px;
  background: #22c55e;
  border-radius: 50%;
  border: 2px solid #0f172a;
}

.name {
  font-weight: bold;
}

.status {
  font-size: 12px;
  color: #22c55e;
  animation: pulse 1.5s infinite;
}

@keyframes pulse {
  0% {opacity: 0.4;}
  50% {opacity: 1;}
  100% {opacity: 0.4;}
}

/* CHAT */
.chat {
  flex: 1;
  overflow-y: auto;
  padding: 12px;
  display: flex;
  flex-direction: column;
}

/* MENSAGENS */
.msg {
  max-width: 85%;
  padding: 10px 14px;
  margin: 6px 0;
  border-radius: 14px;
  font-size: 14px;
  line-height: 1.4;
  animation: fadeIn 0.4s ease;
}

.left {
  background: #1e293b;
}

.right {
  background: linear-gradient(135deg, #22c55e, #4ade80);
  color: black;
  align-self: flex-end;
}

.typing {
  font-size: 13px;
  opacity: 0.6;
  font-style: italic;
}

a {
  color: #38bdf8;
  text-decoration: none;
  display: inline-block;
  margin-top: 5px;
}

.btn {
  display: block;
  margin-top: 8px;
  background: #22c55e;
  padding: 10px;
  border-radius: 8px;
  text-align: center;
  color: black;
  font-weight: bold;
}

@keyframes fadeIn {
  from {transform: translateY(10px); opacity: 0;}
  to {transform: translateY(0); opacity: 1;}
}

/* MOBILE */
@media (max-width: 480px) {
  .container {
    height: 100vh;
    border-radius: 0;
  }

  .msg {
    font-size: 15px;
  }
}
</style>
</head>

<body>

<div class="container">
  <div class="header">
    <div class="avatar-container" onclick="abrirFoto()">
      <div class="avatar"></div>
      <div class="online"></div>
    </div>

    <div>
      <div class="name">Petrus Borghi</div>
      <div class="status">online</div>
    </div>
  </div>

  <div class="chat" id="chat"></div>
</div>

<!-- MODAL FOTO -->
<div id="modalFoto" style="
  display:none;
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.8);
  justify-content:center;
  align-items:center;
  z-index:999;
">
  <img src="foto.jpg" style="
    width:90%;
    max-width:400px;
    border-radius:15px;
  ">
</div>

<script>
const chat = document.getElementById("chat");

function criarMsg(classe) {
  const div = document.createElement("div");
  div.className = "msg " + classe;
  chat.appendChild(div);
  chat.scrollTop = chat.scrollHeight;
  return div;
}

function digitando() {
  const div = criarMsg("left typing");
  div.innerText = "digitando...";
  return div;
}

function delay(ms) {
  return new Promise(res => setTimeout(res, ms));
}

async function escrever(el, texto, vel = 20) {
  for (let i = 0; i < texto.length; i++) {
    el.innerHTML += texto[i];
    await delay(vel);
  }
}

function abrirFoto() {
  document.getElementById("modalFoto").style.display = "flex";
}

document.getElementById("modalFoto").onclick = function() {
  this.style.display = "none";
}

async function iniciar() {

  let h = new Date().getHours();
  let saudacao = h < 12 ? "Bom dia ☀️" :
                  h < 18 ? "Boa tarde 🌤️" :
                  "Boa noite 🌙";

  let t;

  t = digitando(); await delay(900); t.remove();
  let m1 = criarMsg("left");
  await escrever(m1, "Oi, tudo bem? 👋👨🏻‍💻");

  t = digitando(); await delay(900); t.remove();
  let m2 = criarMsg("right");
  await escrever(m2, "Sou o Petrus Borghi");

  t = digitando(); await delay(1000); t.remove();
  let m3 = criarMsg("left");
  await escrever(m3, "Formado em Ciência da Computação, Pedagogia e pós em Tecnologias aplicadas à educação.");

  t = digitando(); await delay(900); t.remove();
  let m4 = criarMsg("left");
  m4.innerHTML = "Email:<br><a href='mailto:phborghif@gmail.com'>phborghif@gmail.com</a>";

  t = digitando(); await delay(900); t.remove();
  let m5 = criarMsg("left");
  m5.innerHTML = "Currículo 📝<br><a class='btn' href='curriculo.pdf' download>Baixar agora</a>";

  t = digitando(); await delay(900); t.remove();
  let m6 = criarMsg("left");
  m6.innerHTML = `
    Fale comigo:<br>
    <a class="btn" href="https://wa.me/5517981365625" target="_blank">WhatsApp</a>
    <a class="btn" href="https://www.instagram.com/petrushbf/" target="_blank">Instagram</a>
  `;

  t = digitando(); await delay(900); t.remove();
  let m7 = criarMsg("right");
  await escrever(m7, saudacao);

  t = digitando(); await delay(700); t.remove();
  let m8 = criarMsg("left");
  await escrever(m8, "Obrigado pela visita 🙏");
}

iniciar();
</script>

</body>
</html>
