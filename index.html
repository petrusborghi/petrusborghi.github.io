<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Petrus Borghi</title>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: -apple-system, BlinkMacSystemFont, Arial;
}

body {
  background: #111;
  display: flex;
  justify-content: center;
  align-items: center;
  min-height: 100vh;
  padding: 10px;
}

/* IPHONE RESPONSIVO */
.phone {
  aspect-ratio: 9 / 19.5;
  height: 95vh;
  max-height: 740px;
  width: auto;

  background: #000;
  border-radius: 50px;
  padding: 10px;
  position: relative;
  box-shadow: 0 0 60px rgba(0,0,0,0.9);
}

/* NOTCH */
.notch {
  position: absolute;
  top: 8px;
  left: 50%;
  transform: translateX(-50%);
  width: 140px;
  height: 22px;
  background: black;
  border-radius: 20px;
  z-index: 10;
}

/* SCREEN */
.screen {
  width: 100%;
  height: 100%;
  border-radius: 40px;
  overflow: hidden;
  display: flex;
  flex-direction: column;
}

/* STATUS BAR */
.statusbar {
  height: 28px;
  background: #075E54;
  color: white;
  display: flex;
  justify-content: space-between;
  padding: 5px 10px;
  font-size: 12px;
}

/* HEADER */
.header {
  background: #075E54;
  padding: 8px;
  display: flex;
  align-items: center;
  gap: 10px;
  color: white;
}

.avatar {
  width: 38px;
  height: 38px;
  border-radius: 50%;
  background: url('foto.jpg');
  background-size: cover;
  background-position: center;
}

.info {
  display: flex;
  flex-direction: column;
}

.name {
  font-weight: bold;
}

.status {
  font-size: 12px;
  color: #25D366;
}

/* CHAT */
.chat {
  flex: 1;
  padding: 10px;
  overflow-y: auto;
  background: #ece5dd;
}

/* MENSAGEM */
.msg {
  background: #DCF8C6;
  padding: 10px;
  border-radius: 10px;
  margin: 6px 0;
  max-width: 80%;
  font-size: 14px;
  animation: fadeIn 0.3s;
}

.typing {
  opacity: 0.6;
  font-style: italic;
}

/* INPUT */
.input {
  display: flex;
  padding: 10px;
  background: #f0f0f0;
  gap: 8px;
}

.input input {
  flex: 1;
  padding: 10px;
  border-radius: 20px;
  border: none;
}

.input button {
  background: #25D366;
  border: none;
  padding: 10px 14px;
  border-radius: 50%;
  color: white;
  cursor: pointer;
}

/* HOME BAR */
.homebar {
  height: 20px;
  background: black;
  display: flex;
  justify-content: center;
  align-items: center;
}

.homebar::after {
  content: "";
  width: 100px;
  height: 5px;
  background: #555;
  border-radius: 10px;
}

/* ANIMAÇÃO */
@keyframes fadeIn {
  from {opacity:0; transform:translateY(10px);}
  to {opacity:1;}
}

/* MOBILE */
@media(max-width:480px){
  .phone {
    height: 100vh;
    border-radius: 0;
  }
}
</style>
</head>

<body>

<div class="phone">
  <div class="notch"></div>

  <div class="screen">

    <div class="statusbar">
      <div id="hora"></div>
      <div>📶 🔋</div>
    </div>

    <div class="header">
      <div class="avatar"></div>
      <div class="info">
        <div class="name">Petrus Borghi</div>
        <div class="status">online</div>
      </div>
    </div>

    <div class="chat" id="chat"></div>

    <div class="input">
      <input type="text" placeholder="Digite uma mensagem">
      <button onclick="abrirWhats()">➤</button>
    </div>

    <div class="homebar"></div>

  </div>
</div>

<script>
const chat = document.getElementById("chat");

function criarMsg(texto) {
  const div = document.createElement("div");
  div.className = "msg";
  div.innerHTML = texto;
  chat.appendChild(div);
  chat.scrollTop = chat.scrollHeight;
}

function digitando() {
  const div = document.createElement("div");
  div.className = "msg typing";
  div.innerText = "digitando...";
  chat.appendChild(div);
  return div;
}

function delay(ms){
  return new Promise(r=>setTimeout(r,ms));
}

async function iniciar(){

  let h = new Date().getHours();
  let saudacao = h < 12 ? "Bom dia ☀️" :
                  h < 18 ? "Boa tarde 🌤️" :
                  "Boa noite 🌙";

  let t;

  t = digitando(); await delay(1000); t.remove();
  criarMsg("Oi, tudo bem? 👋");

  t = digitando(); await delay(1000); t.remove();
  criarMsg("Sou o Petrus Borghi");

  t = digitando(); await delay(1200); t.remove();
  criarMsg("Formado em Ciência da Computação, Pedagogia e pós em Tecnologias aplicadas à educação.");

  t = digitando(); await delay(1000); t.remove();
  criarMsg("Meu email:<br>phborghif@gmail.com");

  t = digitando(); await delay(1000); t.remove();
  criarMsg("<a href='curriculo.pdf' download>Baixar currículo 📝</a>");

  t = digitando(); await delay(1000); t.remove();
  criarMsg(`
    Instagram:<br>
    <a href="https://www.instagram.com/petrushbf/" target="_blank">Abrir</a><br><br>
    WhatsApp:<br>
    <a href="https://wa.me/5517981365625" target="_blank">Falar comigo</a>
  `);

  t = digitando(); await delay(1000); t.remove();
  criarMsg(saudacao);

  t = digitando(); await delay(800); t.remove();
  criarMsg("Obrigado pela visita 🙏");
}

function abrirWhats(){
  window.open("https://wa.me/5517981365625", "_blank");
}

/* HORA */
function atualizarHora(){
  let d = new Date();
  let h = d.getHours().toString().padStart(2,'0');
  let m = d.getMinutes().toString().padStart(2,'0');
  document.getElementById("hora").innerText = h + ":" + m;
}

setInterval(atualizarHora, 1000);
atualizarHora();

iniciar();
</script>

</body>
</html>
