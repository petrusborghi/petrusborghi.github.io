<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Petrus Borghi</title>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: -apple-system, BlinkMacSystemFont, "San Francisco", Arial;
}

body {
  background: #111;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
}

/* IPHONE */
.phone {
  width: 360px;
  height: 720px;
  background: black;
  border-radius: 40px;
  padding: 10px;
  box-shadow: 0 0 40px rgba(0,0,0,0.8);
  position: relative;
}

.screen {
  width: 100%;
  height: 100%;
  border-radius: 30px;
  overflow: hidden;
  display: flex;
  flex-direction: column;
}

/* HEADER WHATS */
.header {
  background: #075E54;
  padding: 12px;
  color: white;
  font-weight: bold;
}

/* CHAT */
.chat {
  flex: 1;
  padding: 10px;
  overflow-y: auto;

  /* FUNDO WHATS */
  background: url('https://i.imgur.com/7yUvePI.png');
  background-size: cover;
}

/* MENSAGEM */
.msg {
  background: #DCF8C6;
  color: black;
  padding: 10px;
  border-radius: 10px;
  margin: 6px 0;
  max-width: 80%;
  font-size: 14px;
  animation: fadeIn 0.3s ease;
}

.typing {
  font-style: italic;
  opacity: 0.6;
}

/* INPUT */
.input {
  display: flex;
  padding: 10px;
  background: #eee;
  gap: 8px;
}

.input input {
  flex: 1;
  padding: 10px;
  border-radius: 20px;
  border: none;
}

.input button {
  background: #25D366;
  border: none;
  padding: 10px 14px;
  border-radius: 50%;
  color: white;
  cursor: pointer;
}

/* ANIMAÇÃO */
@keyframes fadeIn {
  from {opacity:0; transform:translateY(10px);}
  to {opacity:1; transform:translateY(0);}
}

/* MOBILE */
@media(max-width:480px){
  .phone {
    width: 100%;
    height: 100vh;
    border-radius: 0;
  }
}
</style>
</head>

<body>

<div class="phone">
  <div class="screen">

    <div class="header">
      Petrus Borghi 🟢 online
    </div>

    <div class="chat" id="chat"></div>

    <div class="input">
      <input type="text" placeholder="Digite uma mensagem">
      <button onclick="abrirWhats()">➤</button>
    </div>

  </div>
</div>

<script>
const chat = document.getElementById("chat");

function criarMsg(texto) {
  const div = document.createElement("div");
  div.className = "msg";
  div.innerHTML = texto;
  chat.appendChild(div);
  chat.scrollTop = chat.scrollHeight;
}

function digitando() {
  const div = document.createElement("div");
  div.className = "msg typing";
  div.innerText = "digitando...";
  chat.appendChild(div);
  return div;
}

function delay(ms){
  return new Promise(r=>setTimeout(r,ms));
}

async function iniciar(){

  let h = new Date().getHours();
  let saudacao = h < 12 ? "Bom dia ☀️" :
                  h < 18 ? "Boa tarde 🌤️" :
                  "Boa noite 🌙";

  let t;

  t = digitando(); await delay(1000); t.remove();
  criarMsg("Oi, tudo bem? 👋");

  t = digitando(); await delay(1000); t.remove();
  criarMsg("Sou o Petrus Borghi");

  t = digitando(); await delay(1200); t.remove();
  criarMsg("Formado em Ciência da Computação, Pedagogia e pós em Tecnologias aplicadas à educação.");

  t = digitando(); await delay(1000); t.remove();
  criarMsg("Meu email:<br>phborghif@gmail.com");

  t = digitando(); await delay(1000); t.remove();
  criarMsg("<a href='curriculo.pdf' download>Baixar currículo 📝</a>");

  t = digitando(); await delay(1000); t.remove();
  criarMsg(`
    Instagram:<br>
    <a href="https://www.instagram.com/petrushbf/" target="_blank">Abrir</a><br><br>
    WhatsApp:<br>
    <a href="https://wa.me/5517981365625" target="_blank">Falar comigo</a>
  `);

  t = digitando(); await delay(1000); t.remove();
  criarMsg(saudacao);

  t = digitando(); await delay(800); t.remove();
  criarMsg("Obrigado pela visita 🙏");
}

function abrirWhats(){
  window.open("https://wa.me/5517981365625", "_blank");
}

iniciar();
</script>

</body>
</html>
