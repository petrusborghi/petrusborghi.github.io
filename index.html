<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Petrus Borghi</title>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  font-family: 'Segoe UI', sans-serif;
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  background: linear-gradient(270deg, #020617, #0f172a, #020617);
  background-size: 400% 400%;
  animation: bgMove 15s ease infinite;
  color: white;
}

/* FUNDO ANIMADO */
@keyframes bgMove {
  0% { background-position: 0% }
  50% { background-position: 100% }
  100% { background-position: 0% }
}

/* CONTAINER RESPONSIVO */
.container {
  width: 95%;
  max-width: 420px;
  height: 90vh;
  border-radius: 20px;
  background: rgba(15,23,42,0.75);
  backdrop-filter: blur(15px);
  box-shadow: 0 0 60px rgba(56,189,248,0.15);
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

/* HEADER */
.header {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 12px;
  border-bottom: 1px solid rgba(255,255,255,0.05);
}

.avatar {
  width: 42px;
  height: 42px;
  border-radius: 50%;
  background: url('https://i.imgur.com/6VBx3io.png');
  background-size: cover;
}

.name {
  font-weight: bold;
}

.status {
  font-size: 12px;
  color: #22c55e;
  animation: pulse 1.5s infinite;
}

@keyframes pulse {
  0% {opacity: 0.4;}
  50% {opacity: 1;}
  100% {opacity: 0.4;}
}

/* CHAT */
.chat {
  flex: 1;
  overflow-y: auto;
  padding: 12px;
  display: flex;
  flex-direction: column;
}

/* MENSAGENS */
.msg {
  max-width: 85%;
  padding: 10px 14px;
  margin: 6px 0;
  border-radius: 14px;
  font-size: 14px;
  line-height: 1.4;
  animation: fadeIn 0.4s ease;
  word-wrap: break-word;
}

.left {
  background: #1e293b;
}

.right {
  background: linear-gradient(135deg, #22c55e, #4ade80);
  color: black;
  align-self: flex-end;
}

/* DIGITANDO */
.typing {
  font-size: 13px;
  opacity: 0.6;
  font-style: italic;
}

/* LINKS */
a {
  color: #38bdf8;
  text-decoration: none;
  display: inline-block;
  margin-top: 5px;
}

/* BOTÕES GRANDES PRA CELULAR */
.btn {
  display: block;
  margin-top: 8px;
  background: #22c55e;
  padding: 10px;
  border-radius: 8px;
  text-align: center;
  color: black;
  font-weight: bold;
}

/* ANIMAÇÃO */
@keyframes fadeIn {
  from {transform: translateY(10px); opacity: 0;}
  to {transform: translateY(0); opacity: 1;}
}

/* MOBILE EXTRA */
@media (max-width: 480px) {
  .container {
    height: 100vh;
    border-radius: 0;
  }

  .msg {
    font-size: 15px;
  }
}
</style>
</head>

<body>

<div class="container">
  <div class="header">
    <div class="avatar"></div>
    <div>
      <div class="name">Petrus Borghi</div>
      <div class="status">online</div>
    </div>
  </div>

  <div class="chat" id="chat"></div>
</div>

<script>
const chat = document.getElementById("chat");

function criarMsg(classe) {
  const div = document.createElement("div");
  div.className = "msg " + classe;
  chat.appendChild(div);
  chat.scrollTop = chat.scrollHeight;
  return div;
}

function digitando() {
  const div = criarMsg("left typing");
  div.innerText = "digitando...";
  return div;
}

function delay(ms) {
  return new Promise(res => setTimeout(res, ms));
}

async function escrever(el, texto, vel = 20) {
  for (let i = 0; i < texto.length; i++) {
    el.innerHTML += texto[i];
    await delay(vel);
  }
}

async function iniciar() {

  let h = new Date().getHours();
  let saudacao = h < 12 ? "Bom dia ☀️" :
                  h < 18 ? "Boa tarde 🌤️" :
                  "Boa noite 🌙";

  let t;

  t = digitando(); await delay(900); t.remove();
  let m1 = criarMsg("left");
  await escrever(m1, "Oi, tudo bem? 👋👨🏻‍💻");

  t = digitando(); await delay(900); t.remove();
  let m2 = criarMsg("right");
  await escrever(m2, "Sou o Petrus Borghi");

  t = digitando(); await delay(1000); t.remove();
  let m3 = criarMsg("left");
  await escrever(m3, "Formado em Ciência da Computação, Pedagogia e pós em Tecnologias aplicadas à educação presencial.");

  t = digitando(); await delay(900); t.remove();
  let m4 = criarMsg("left");
  m4.innerHTML = "Email:<br><a href='mailto:phborghif@gmail.com'>phborghif@gmail.com</a>";

  t = digitando(); await delay(900); t.remove();
  let m5 = criarMsg("left");
  m5.innerHTML = "Currículo 📝<br><a class='btn' href='curriculo.pdf' download>Baixar agora</a>";

  t = digitando(); await delay(900); t.remove();
  let m6 = criarMsg("left");
  m6.innerHTML = `
    Fale comigo:<br>
    <a class="btn" href="https://wa.me/5517981365625" target="_blank">WhatsApp</a>
    <a class="btn" href="https://www.instagram.com/petrushbf/" target="_blank">Instagram</a>
  `;

  t = digitando(); await delay(900); t.remove();
  let m7 = criarMsg("right");
  await escrever(m7, saudacao);

  t = digitando(); await delay(700); t.remove();
  let m8 = criarMsg("left");
  await escrever(m8, "Obrigado pela visita 🙏");
}

iniciar();
</script>

</body>
</html>
